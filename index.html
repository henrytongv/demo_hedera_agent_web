<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Application</title>
    
    <!-- Vuetify CSS -->
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.min.css" rel="stylesheet">
    <!-- Material Design Icons -->
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.9.96/css/materialdesignicons.min.css" rel="stylesheet">
    
    <style>
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 16px;
            background-color: #f5f5f5;
        }
        .user-message {
            background-color: #1976D2;
            color: white;
            padding: 12px 16px;
            border-radius: 18px;
            margin: 8px 0;
            max-width: 70%;
            margin-left: auto;
            word-wrap: break-word;
        }
        .ai-message {
            background-color: #E0E0E0;
            color: black;
            padding: 12px 16px;
            border-radius: 18px;
            margin: 8px 0;
            max-width: 70%;
            margin-right: auto;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div id="app">
        <v-app>
            <v-app-bar app color="primary" dark>
                <v-toolbar-title>
                    <v-icon left>mdi-robot</v-icon>
                    AI Chat Application
                </v-toolbar-title>
                <v-spacer></v-spacer>
                <v-btn icon @click="clearChat">
                    <v-icon>mdi-delete</v-icon>
                </v-btn>
            </v-app-bar>

            <v-main>
                <v-container fluid>
                    <v-card elevation="2">
                        <v-card-title>Chat</v-card-title>
                        
                        <!-- Chat messages display area -->
                        <div ref="chatContainer" class="chat-container">
                            <div v-for="(msg, index) in messages" :key="index">
                                <div :class="msg.type === 'user' ? 'user-message' : 'ai-message'">
                                    {{ msg.text }}
                                </div>
                            </div>
                        </div>

                        <v-divider></v-divider>

                        <!-- Input area -->
                        <v-card-actions>
                            <v-text-field
                                v-model="userInput"
                                label="Type your message..."
                                outlined
                                dense
                                hide-details
                                @keyup.enter="sendMessage"
                                :disabled="loading"
                                class="mx-2"
                            ></v-text-field>
                            <v-btn
                                color="primary"
                                @click="sendMessage"
                                :loading="loading"
                                :disabled="!userInput.trim()"
                            >
                                <v-icon left>mdi-send</v-icon>
                                Send
                            </v-btn>
                        </v-card-actions>
                    </v-card>
                </v-container>
            </v-main>
        </v-app>
    </div>

    <!-- Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <!-- Vuetify -->
    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.6.14/dist/vuetify.js"></script>

    <script>
        new Vue({
            el: '#app',
            vuetify: new Vuetify(),
            data: {
                messages: [],
                userInput: '',
                loading: false
            },
            methods: {
                async sendMessage() {
                    if (!this.userInput.trim()) return;

                    // Add user message to chat
                    this.messages.push({
                        type: 'user',
                        text: this.userInput
                    });

                    const messageToSend = this.userInput;
                    this.userInput = '';
                    this.loading = true;

                    // Scroll to bottom after adding user message
                    this.$nextTick(() => {
                        this.scrollToBottom();
                    });

                    try {
                        // Send message to backend
                        const response = await fetch('/chat', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ message: messageToSend })
                        });

                        const data = await response.json();

                        // Add AI response to chat
                        this.messages.push({
                            type: 'ai',
                            text: data.response
                        });

                        // Scroll to bottom after adding AI message
                        this.$nextTick(() => {
                            this.scrollToBottom();
                        });
                    } catch (error) {
                        console.error('Error sending message:', error);
                        this.messages.push({
                            type: 'ai',
                            text: 'Error: Could not connect to server'
                        });
                    } finally {
                        this.loading = false;
                    }
                },
                clearChat() {
                    this.messages = [];
                    this.userInput = '';
                },
                scrollToBottom() {
                    const container = this.$refs.chatContainer;
                    if (container) {
                        container.scrollTop = container.scrollHeight;
                    }
                }
            }
        });
    </script>
</body>
</html>
